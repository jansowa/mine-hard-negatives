[tool.ruff]
target-version = "py312"
line-length = 120
src = ["app_code", "tests"]
exclude = [
  ".venv",
  "app_code/data_backup",
  "logs",
  "merge_data",
  "runs",
]

[tool.ruff.lint]
select = [
  "E9", # pycodestyle syntax/runtime errors
  "F",  # Pyflakes: undefined names, unused imports, and similar correctness issues
  "I",  # isort: import ordering
  "B",  # flake8-bugbear: likely bugs and risky patterns
]
ignore = [
  "B905", # Require explicit strict= for zip(); useful later, noisy for the current codebase
]

[tool.mypy]
python_version = "3.12"
files = ["app_code", "tests"]
exclude = [
  "^app_code/data_backup/",
  "^logs/",
  "^merge_data/",
  "^runs/",
]
ignore_missing_imports = true
follow_imports = "silent"
show_error_codes = true
warn_unused_configs = true
check_untyped_defs = false
disable_error_code = [
  "arg-type",
  "assignment",
  "attr-defined",
  "no-redef",
  "union-attr",
  "var-annotated",
]
